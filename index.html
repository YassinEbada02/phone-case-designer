<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Phone Case Designer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

</head>

<body>

<header>

<h1>📱 Phone Case Designer</h1>

</header>

<div class="designer">

<div class="left-panel">

<h2>Tools</h2>

<input type="file"
id="case_designer_image_input"
accept="image/*"
multiple>

<hr>

<input
id="case_designer_text_input"
placeholder="Write text">

<button id="case_designer_add_text_btn">

Add Text

</button>

<hr>

<label>Text Color</label>

<input
type="color"
id="case_designer_text_color"
value="#000000">

<label>Font Size</label>

<input
type="range"
id="case_designer_text_size"
min="10"
max="80"
value="28">

<hr>

<button id="case_designer_delete_layer_btn">

Delete Selected

</button>

<button id="case_designer_clear_btn">

Clear All

</button>

</div>

<div class="canvas-area">

<canvas
id="case_designer_canvas"
width="500"
height="700">
</canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
